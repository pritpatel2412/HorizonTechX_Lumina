kind = "web"
previewPath = "/"
title = "LUMINA"
version = "1.0.0"
id = "artifacts/lumina"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25762

[services.development]
run = "pnpm --filter @workspace/lumina run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lumina", "run", "build" ]
publicDir = "artifacts/lumina/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25762"
BASE_PATH = "/"
